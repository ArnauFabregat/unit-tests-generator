name: CI Quality Checks

on:
  pull_request:
    branches: [ main ]
  # push:
  #   branches: [ dev ] # Opcional: també passa tests quan pugis a dev per anar sobre segur

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Instal·lem el paquet en mode editable (-e) perquè pytest trobi el codi a /src
          pip install -e .
          pip install ruff mypy

      - name: Lint with Ruff
        # L'output format 'github' fa que els errors apareguin directament al codi de la PR
        run: ruff check --output-format=github .

      - name: Type check with Mypy
        # Mypy usarà la config del teu pyproject.toml automàticament
        run: mypy --install-types --non-interactive

      - name: Run Tests with Pytest
        # Executa els tests i genera l'informe de cobertura que tens configurat
        run: |
          pytest --cov=src
        env:
          # Posem valors ficticis perquè el codi no doni ValueError
          LLM_OPENROUTER_MODEL: "openrouter/openrouter/el-meu-llm"
          LLM_OPENROUTER_API_KEY: "sk-fake-key-for-tests"
